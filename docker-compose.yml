services:
  postgres:
    build:
      context: .
      dockerfile: db/Dockerfile
    container_name: riposte-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: riposte
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command: >
      postgres -c shared_preload_libraries=pg_cron -c cron.database_name=riposte -c max_connections=250
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./db/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d riposte']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
